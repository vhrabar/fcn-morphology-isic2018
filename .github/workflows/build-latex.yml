name: Build Paper PDF

on:
  push:
    branches: [ paper ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install minimal LaTeX
      - name: Install minimal LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-fonts-extra \
            texlive-lang-european

      # Compile paper
      - name: Compile paper
        working-directory: paper
        run: latexmk -pdf -interaction=nonstopmode -f main.tex

      # Move PDF to output directory
      - name: Move PDF
        run: |
          mkdir -p paper/output
          mv paper/main.pdf paper/output/paper.pdf

      # Commit PDF
      - name: Commit PDF
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add paper/output/paper.pdf
          git diff --cached --quiet || git commit -m "Auto-update paper PDF [skip ci]"
          git push